<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0b1120"/>
  <!-- Three cost-comparison bars: scratch (red/tall), open-source (blue/mid), commercial (violet/short) -->
  <rect x="4"  y="7"  width="6" height="18" rx="1.5" fill="#f87171"/>
  <rect x="13" y="13" width="6" height="12" rx="1.5" fill="#3b82f6"/>
  <rect x="22" y="17" width="6" height="8"  rx="1.5" fill="#a78bfa"/>
  <!-- Emerald dashed threshold line -->
  <line x1="2" y1="13" x2="30" y2="13" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/>
</svg>
